<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Counter</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Counter</h1>
      <span id="value">0</span>

      <div class="btn-container">
        <button id="decrease" onclick="minusCount()">DECREASE</button>
        <button id="reset" onclick="resetCount()">RESET</button>
        <button id="increase" onclick="plusCount()">INCREASE</button>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
